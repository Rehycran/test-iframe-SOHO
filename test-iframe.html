<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; font-family: sans-serif; background: transparent; }
  #slider-wrap { width: 100%; position: relative; box-sizing: border-box; padding: 0 40px; }
  #slides-container { width: 100%; }
  #slides-container img { width: 100%; max-height: 500px; object-fit: contain; display: none; }
  #slides-container img.active { display: block; }
  #slider-nav { text-align: center; margin-top: 8px; }
  #slider-nav span { cursor: pointer; font-size: 18px; margin: 3px; color: #bbb; }
  #slider-nav span.active { color: #333; }
  #slider-caption { margin-top: 6px; padding: 4px 10px; background: rgba(0,0,0,0.5); color: white; font-size: 14px; border-radius: 5px; display: inline-block; }
  .arrow { position: absolute; top: 45%; transform: translateY(-50%); font-size: 22px; background: none; border: none; cursor: pointer; padding: 0; }
  #slider-prev { left: 0; }
  #slider-next { right: 0; }
</style>
</head>
<body>

<div id="slider-wrap">
  <button class="arrow" id="slider-prev">⬅️</button>
  <div id="slides-container">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-1.png">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-1-1.png">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-2.png">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-3.png">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-4.png">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-4-1.png">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-5.png">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-6.png">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-6-1.png">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-6-2.png">
    <img src="https://rehycran.github.io/test-iframe-SOHO/extractdonnees-8.png">
  </div>
  <button class="arrow" id="slider-next">➡️</button>
  <div id="slider-nav"></div>
  <div id="slider-caption">5.</div>
</div>

<script>
  var current = 0;
  var captions = ['5.','6.','7.','8.','9.','10.','11.','12.','12.','12.','12.'];
  var imgs = document.querySelectorAll('#slides-container img');
  var nav = document.getElementById('slider-nav');
  var caption = document.getElementById('slider-caption');
  var total = imgs.length;

  imgs[0].classList.add('active');

  for (var i = 0; i < total; i++) {
    var dot = document.createElement('span');
    dot.innerHTML = '●';
    dot.onclick = (function(idx){ return function(){ goTo(idx); }; })(i);
    nav.appendChild(dot);
  }
  nav.querySelectorAll('span')[0].classList.add('active');

  function goTo(idx) {
    imgs[current].classList.remove('active');
    nav.querySelectorAll('span')[current].classList.remove('active');
    current = (idx + total) % total;
    imgs[current].classList.add('active');
    nav.querySelectorAll('span')[current].classList.add('active');
    caption.innerHTML = captions[current];
  }

  document.getElementById('slider-prev').onclick = function(){ goTo(current - 1); };
  document.getElementById('slider-next').onclick = function(){ goTo(current + 1); };
</script>

</body>
</html>
