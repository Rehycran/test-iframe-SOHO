<style>
.slider {
  width: 600px;
  position: relative;
  margin-left: 0;
}

/* cacher radios */
input {
  display: none;
}

.slides {
  position: relative;
  margin-left: 50px;
}

.slides img {
  width: 90%;
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

/* afficher image active */
#s1:checked ~ .slides .img1,
#s2:checked ~ .slides .img2,
#s3:checked ~ .slides .img3,
#s4:checked ~ .slides .img4,
#s5:checked ~ .slides .img5,
#s6:checked ~ .slides .img6,
#s7:checked ~ .slides .img7,
#s8:checked ~ .slides .img8,
#s9:checked ~ .slides .img9,
#s10:checked ~ .slides .img10,
#s11:checked ~ .slides .img11 {
  opacity: 1;
  position: relative;
}

/* cacher toutes les légendes */
.caption span {
  display: none;
}

/* afficher la bonne selon le slide actif */
#s1:checked ~ .caption .c1,
#s2:checked ~ .caption .c2,
#s3:checked ~ .caption .c3,
#s4:checked ~ .caption .c4,
#s5:checked ~ .caption .c5,
#s6:checked ~ .caption .c6,
#s7:checked ~ .caption .c7,
#s8:checked ~ .caption .c8,
#s9:checked ~ .caption .c9,
#s10:checked ~ .caption .c10,
#s11:checked ~ .caption .c11 {
  display: block;
}
  
/* points */
.nav {
  text-align: center;
  margin-top: 10px;
}

.nav label {
  cursor: pointer;
  font-size: 20px;
  margin: 5px;
  color: #bbb;
}

#s1:checked ~ .nav label[for="s1"],
#s2:checked ~ .nav label[for="s2"],
#s3:checked ~ .nav label[for="s3"],
#s4:checked ~ .nav label[for="s4"],
#s5:checked ~ .nav label[for="s5"],
#s6:checked ~ .nav label[for="s6"],
#s7:checked ~ .nav label[for="s7"],
#s8:checked ~ .nav label[for="s8"],
#s9:checked ~ .nav label[for="s9"],
#s10:checked ~ .nav label[for="s10"],
#s11:checked ~ .nav label[for="s11"] {
  color: #333;
}

/* flèches */
.arrows label {
  position: absolute;
  top: 45%;
  font-size: 24px;
  cursor: pointer;
  display: none;
}

/* afficher bonnes flèches */
#s1:checked ~ .arrows .s1,
#s2:checked ~ .arrows .s2,
#s3:checked ~ .arrows .s3,
#s4:checked ~ .arrows .s4,
#s5:checked ~ .arrows .s5,
#s6:checked ~ .arrows .s6,
#s7:checked ~ .arrows .s7,
#s8:checked ~ .arrows .s8,
#s9:checked ~ .arrows .s9,
#s10:checked ~ .arrows .s10,
#s11:checked ~ .arrows .s11 {
  display: block;
}

.caption {
  position: absolute;
  bottom: 10px;
  left: 10px;
  font-size: 14px;
  background: rgba(0,0,0,0.5);
  color: white;
  padding: 5px 10px;
  border-radius: 5px;
}
  
.prev { left: 10px; }
.next { right: 10px; }
</style>
